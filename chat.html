<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bowden Tech Grok MCP • Orlando MSP</title>
    <style>
        :root {
            --accent: #00d9ff;
            --bg: #0a0a0a;
            --card: #111111;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        .widget {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }
        .header {
            background: #000;
            padding: 1.2rem 2rem;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status {
            font-size: 0.85rem;
            color: #00d9ff;
            background: rgba(0,217,255,0.1);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0,217,255,0.3);
        }
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #050505;
        }
        .message {
            margin-bottom: 18px;
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 12px;
            line-height: 1.5;
        }
        .user {
            background: var(--accent);
            color: #000;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .assistant {
            background: var(--card);
            border: 1px solid #222;
            border-bottom-left-radius: 4px;
        }
        .input-area {
            padding: 16px 20px;
            background: #000;
            border-top: 1px solid #222;
            display: flex;
            gap: 12px;
        }
        input {
            flex: 1;
            padding: 16px 20px;
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 1.05rem;
        }
        button {
            padding: 0 28px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .welcome {
            text-align: center;
            color: var(--accent);
            margin: 40px 0 20px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="widget">
        <div class="header">
            <div class="logo">BOWDEN TECH</div>
            <div class="status">Local Grok MCP • Orlando MSP</div>
        </div>

        <div class="messages" id="messages">
            <div class="welcome">
                Welcome to Bowden Tech's Private AI Assistant<br>
                How can I help with your managed IT or cybersecurity needs today?
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="prompt" placeholder="Ask anything MSP-related... (e.g. pricing for a Winter Park dental office)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('prompt');
            const promptText = input.value.trim();
            if (!promptText) return;

            addMessage(promptText, 'user');
            input.value = '';

            try {
                const res = await fetch('http://127.0.0.1:8000/mcp/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptText })
                });

                const data = await res.json();
                if (data.status === "success") {
                    addMessage(data.response, 'assistant');
                } else {
                    addMessage("Error: " + (data.response || "Unknown error"), 'assistant');
                }
            } catch (e) {
                addMessage("Cannot connect to Local Grok MCP. Make sure mcp_server.py is running.", 'assistant');
            }
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            document.getElementById('messages').appendChild(div);
            div.scrollIntoView({ behavior: "smooth" });
        }

        // Allow pressing Enter to send
        document.getElementById('prompt').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
